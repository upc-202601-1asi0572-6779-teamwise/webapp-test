<div class="min-h-dvh flex flex-col justify-center px-6 py-12" style="background: var(--gradient-hero)">
  <div class="mx-auto w-full" style="max-width: var(--mobile-content-max)">
    <h1 class="text-white mb-2" style="font-family: var(--font-heading); font-size: var(--font-size-h1); font-weight: var(--font-weight-bold); line-height: var(--line-height-h1); letter-spacing: var(--letter-spacing-tight)">
      Recuperar contrase&ntilde;a
    </h1>
    <p class="mb-8" style="font-family: var(--font-body); font-size: var(--font-size-body); line-height: var(--line-height-body); color: var(--color-text-inverse); opacity: 0.8">
      Ingresa tu correo y te enviaremos instrucciones
    </p>

    @if (sent) {
    <div class="mb-4 px-4 py-3 rounded-lg text-sm" style="background: var(--color-emerald-15); color: var(--color-success); border: 1px solid var(--color-success); font-family: var(--font-body)">
      Se envi&oacute; un enlace de recuperaci&oacute;n al correo registrado.
    </div>
    }

    @if (!sent) {
    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div>
        <label class="block mb-1" style="font-family: var(--font-body); font-size: var(--font-size-label); line-height: var(--line-height-label); letter-spacing: var(--letter-spacing-label); color: var(--color-text-inverse); opacity: 0.85">
          Correo electr&oacute;nico
        </label>
        <input formControlName="email" type="email" autocomplete="email"
          class="w-full px-4 py-3 rounded-lg border text-base outline-none transition focus:ring-2"
          style="background: var(--color-white-12); border-color: var(--color-white-12); color: var(--color-text-inverse); font-family: var(--font-body); border-radius: var(--radius-md)"
          placeholder="tu@email.com" />
      </div>

      <button type="submit" [disabled]="form.invalid || loading"
        class="w-full py-3 rounded-lg font-semibold text-base transition disabled:opacity-50"
        style="background: var(--color-brand-secondary); color: var(--color-brand-deep); font-family: var(--font-heading); border-radius: var(--radius-md)">
        {{ loading ? 'Enviando...' : 'Enviar instrucciones' }}
      </button>
    </form>
    }

    <p class="text-center mt-6" style="font-family: var(--font-body); font-size: var(--font-size-small); color: var(--color-white-60)">
      <a routerLink="/auth/login" class="font-medium hover:underline" style="color: var(--color-brand-secondary)">Volver al inicio de sesi&oacute;n</a>
    </p>
  </div>
</div>
