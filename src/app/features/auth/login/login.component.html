<div class="min-h-dvh flex flex-col justify-center px-6 py-12 relative overflow-hidden" style="background: var(--gradient-hero)">
  <div class="absolute inset-0 opacity-[0.03]" style="background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><path d=%22M30 5 Q40 15 30 30 Q20 45 30 55%22 stroke=%22white%22 fill=%22none%22 stroke-width=%220.5%22/></svg>'); background-size: 60px 60px"></div>

  <div class="mx-auto w-full relative" style="max-width: var(--mobile-content-max);">
    <div class="text-center mb-8 animate-fadeUp" style="animation: fadeUp 0.6s ease-out both">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-4 px-3 py-3" style="background: var(--color-white-12); backdrop-filter: var(--blur-glass)">
        <img src="/images/logo/smartPalmLogo.png" alt="Smart Palm" class="max-w-full max-h-full object-contain" />
      </div>
      <h1 class="text-white mb-2" style="font-family: var(--font-heading); font-size: var(--font-size-display); font-weight: var(--font-weight-bold); line-height: var(--line-height-display); letter-spacing: var(--letter-spacing-tight)">
        Smart Palm
      </h1>
      <p style="font-family: var(--font-body); font-size: var(--font-size-body); line-height: var(--line-height-body); color: var(--color-text-inverse); opacity: 0.7">
        Monitoreo inteligente para tus cultivos
      </p>
    </div>

    @if (error) {
    <div class="mb-4 px-4 py-3 rounded-lg text-sm animate-fadeUp" style="background: var(--color-danger-10); color: var(--color-danger); border: 1px solid var(--color-danger); font-family: var(--font-body); animation-delay: 0.15s">
      {{ error }}
    </div>
    }

    <div class="animate-fadeUp" style="animation-delay: 0.2s">
      <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-2xl p-6" style="background: var(--color-white-08); backdrop-filter: var(--blur-glass); border: 1px solid var(--color-white-12)">
        <div class="mb-4">
          <label class="block mb-1.5" style="font-family: var(--font-body); font-size: var(--font-size-label); line-height: var(--line-height-label); letter-spacing: var(--letter-spacing-label); color: var(--color-text-inverse); opacity: 0.8">
            Correo electr&oacute;nico
          </label>
          <input
            formControlName="email"
            type="email"
            autocomplete="email"
            class="w-full px-4 py-3.5 rounded-xl border text-base outline-none transition-all duration-300 focus:ring-2 focus:border-transparent"
            style="background: var(--color-white-06); border-color: var(--color-white-12); color: var(--color-text-inverse); font-family: var(--font-body); --tw-ring-color: var(--color-brand-secondary)"
            placeholder="tu@email.com"
          />
        </div>

        <div class="mb-6">
          <label class="block mb-1.5" style="font-family: var(--font-body); font-size: var(--font-size-label); line-height: var(--line-height-label); letter-spacing: var(--letter-spacing-label); color: var(--color-text-inverse); opacity: 0.8">
            Contrase&ntilde;a
          </label>
          <input
            formControlName="password"
            type="password"
            autocomplete="current-password"
            class="w-full px-4 py-3.5 rounded-xl border text-base outline-none transition-all duration-300 focus:ring-2 focus:border-transparent"
            style="background: var(--color-white-06); border-color: var(--color-white-12); color: var(--color-text-inverse); font-family: var(--font-body); --tw-ring-color: var(--color-brand-secondary)"
            placeholder="Ingresa tu contrase&ntilde;a"
          />
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || loading"
          class="w-full py-3.5 rounded-xl font-bold text-base transition-all duration-300 disabled:opacity-50 hover:scale-[1.02] active:scale-[0.98]"
          style="background: var(--color-brand-secondary); color: var(--color-brand-deep); font-family: var(--font-heading); box-shadow: var(--shadow-cta)"
        >
          {{ loading ? 'Ingresando...' : 'Iniciar sesi&oacute;n' }}
        </button>
      </form>
    </div>

    <div class="flex flex-col items-center gap-2.5 mt-6 animate-fadeUp" style="animation-delay: 0.4s; font-family: var(--font-body); font-size: var(--font-size-small)">
      <a routerLink="/auth/recover-password" class="hover:underline transition-colors" style="color: var(--color-brand-mint)">&#191;Olvidaste tu contrase&ntilde;a?</a>
      <span style="color: var(--color-white-40)">
        &#191;No tienes cuenta? <a routerLink="/auth/register" class="font-medium hover:underline transition-colors" style="color: var(--color-brand-secondary)">Reg&iacute;strate</a>
      </span>
    </div>
  </div>
</div>
