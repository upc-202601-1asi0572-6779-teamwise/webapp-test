<section class="flex flex-col gap-6">
  <header class="rounded-[1.75rem] border px-5 py-6 sm:px-7" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle); box-shadow: var(--shadow-card)">
    <h1 class="text-2xl font-bold sm:text-3xl" style="font-family: var(--font-heading); color: var(--color-text-primary)">{{ title }}</h1>
    <p class="mt-2 max-w-2xl text-sm leading-6" style="color: var(--color-text-secondary)">{{ subtitle }}</p>
    <p class="mt-2 text-xs leading-5" style="color: var(--color-text-muted)">{{ fieldHint }}</p>
  </header>

  @if (error()) {
  <div class="rounded-xl border px-4 py-3 text-sm" style="background: var(--color-danger-10); color: var(--color-danger); border-color: var(--color-danger)">{{ error() }}</div>
  }
  @if (success()) {
  <div class="rounded-xl border px-4 py-3 text-sm" style="background: var(--color-emerald-15); color: var(--color-brand-primary); border-color: var(--color-brand-secondary)">{{ success() }}</div>
  }

  <form (ngSubmit)="runSetup()" [formGroup]="form" class="grid gap-5 lg:grid-cols-2">
    <div class="rounded-2xl border px-5 py-5" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle); box-shadow: var(--shadow-card)">
      <div class="flex items-center gap-2">
        <span class="flex h-7 w-7 items-center justify-center rounded-full text-xs font-bold" style="background: var(--color-emerald-15); color: var(--color-brand-primary)">1</span>
        <h2 class="text-sm font-semibold uppercase tracking-wider" style="color: var(--color-text-muted)">{{ plantationBlock }}</h2>
      </div>

      <label class="mt-4 block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ existingLabel }}</label>
      <select formControlName="existingPlantationId" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 text-sm" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary)">
        <option [ngValue]="0">{{ createNewLabel }}</option>
        @for (p of plantations(); track p.id) {
        <option [ngValue]="p.id">{{ p.name || ('Plantation ' + p.id) }} · {{ p.status }} · {{ p.hectares }} ha</option>
        }
      </select>

      <label class="mt-3 block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ nameLabel }}</label>
      <input formControlName="plantationName" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />

      <div class="mt-3 grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ hectaresLabel }}</label>
          <input type="number" formControlName="hectares" min="0.1" step="0.1" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ addressLabel }}</label>
          <input formControlName="address" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />
        </div>
      </div>
    </div>

    <div class="rounded-2xl border px-5 py-5" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle); box-shadow: var(--shadow-card)">
      <div class="flex items-center gap-2">
        <span class="flex h-7 w-7 items-center justify-center rounded-full text-xs font-bold" style="background: var(--color-emerald-15); color: var(--color-brand-primary)">2</span>
        <h2 class="text-sm font-semibold uppercase tracking-wider" style="color: var(--color-text-muted)">{{ devicesBlock }}</h2>
      </div>

      <label class="mt-4 block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ sectorNameLabel }}</label>
      <input formControlName="sectorName" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />

      <label class="mt-3 block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ iotMacLabel }}</label>
      <input formControlName="iotMac" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 font-mono text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />

      <label class="mt-3 block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ gatewayMacLabel }}</label>
      <input formControlName="gatewayMac" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 font-mono text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />

      <label class="mt-3 block text-xs font-semibold uppercase tracking-wide" style="color: var(--color-text-muted)">{{ zoneIdLabel }}</label>
      <input type="number" formControlName="monitoringZoneId" min="1" class="mt-1.5 w-full rounded-xl border px-3 py-2.5 text-sm outline-none" style="border-color: var(--color-border-subtle); color: var(--color-text-primary)" />

      <button type="submit" [disabled]="saving()" class="mt-5 w-full rounded-xl px-4 py-2.5 text-sm font-semibold transition hover:opacity-90 disabled:opacity-60" style="background: var(--color-brand-primary); color: var(--color-text-inverse)">
        {{ submitLabel }}
      </button>
    </div>
  </form>

  @if (log().length) {
  <div class="rounded-2xl border px-5 py-4" style="background: var(--color-bg-soft-2); border-color: var(--color-border-subtle)">
    <p class="text-xs font-semibold uppercase tracking-wider" style="color: var(--color-text-muted)">{{ logTitle }}</p>
    <ul class="mt-2 flex flex-col gap-1">
      @for (line of log(); track $index) {
      <li class="text-sm" style="color: var(--color-text-secondary)">• {{ line }}</li>
      }
    </ul>
  </div>
  }
</section>
