<section class="flex flex-col gap-6">
  <header class="rounded-[1.75rem] border px-5 py-6 sm:px-7" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle); box-shadow: var(--shadow-card)">
    <h1 class="text-2xl font-bold sm:text-3xl" style="font-family: var(--font-heading); color: var(--color-text-primary)">
      {{ title }}
    </h1>
    <p class="mt-2 max-w-2xl text-sm leading-6" style="color: var(--color-text-secondary)">
      {{ subtitle }}
    </p>
  </header>

  <div class="grid gap-4 md:grid-cols-2">
    @for (step of steps(); track step.n) {
    <article class="rounded-2xl border px-5 py-5" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle); box-shadow: var(--shadow-card)">
      <div class="flex items-start gap-3">
        <span
          class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full text-sm font-bold"
          style="background: var(--color-emerald-15); color: var(--color-brand-primary)"
        >
          {{ step.n }}
        </span>
        <div class="min-w-0 flex-1">
          <h2 class="text-base font-semibold" style="color: var(--color-text-primary)">{{ step.title }}</h2>
          <p class="mt-1 text-sm leading-6" style="color: var(--color-text-muted)">{{ step.desc }}</p>
          @if (step.link && step.cta) {
          <a
            [routerLink]="step.link"
            class="mt-4 inline-flex rounded-xl px-3.5 py-2 text-xs font-semibold transition hover:opacity-90"
            style="background: var(--color-brand-primary); color: var(--color-text-inverse)"
          >
            {{ step.cta }}
          </a>
          }
        </div>
      </div>
    </article>
    }
  </div>
</section>
