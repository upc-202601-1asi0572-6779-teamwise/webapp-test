<div class="relative">
  <button type="button" (click)="toggle()"
    class="relative flex h-11 w-11 items-center justify-center rounded-full transition hover:scale-[1.03]"
    style="background: rgba(11, 38, 24, 0.55); border: 1px solid rgba(255,255,255,0.09); color: var(--color-text-inverse); backdrop-filter: blur(14px)">
    @if (loading()) {
    <div class="h-4 w-4 animate-spin rounded-full border-2" style="border-color: rgba(255,255,255,0.15); border-top-color: var(--color-brand-secondary)"></div>
    } @else {
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"/>
      <path d="M9 17a3 3 0 0 0 6 0"/>
    </svg>
    }
    @if (unreadCount() > 0) {
    <span class="absolute -right-0.5 -top-0.5 flex h-5 min-w-[1.25rem] items-center justify-center rounded-full px-1 text-[0.7rem] font-bold"
      style="background: var(--color-danger); color: var(--color-text-inverse)">
      {{ unreadCount() }}
    </span>
    }
  </button>

  @if (open()) {
  <div class="absolute right-0 top-[calc(100%+0.75rem)] z-30 w-[22rem] rounded-[1.35rem] p-5 shadow-[0_22px_50px_rgba(3,14,9,0.28)]"
    style="background: rgba(11, 38, 24, 0.97); border: 1px solid rgba(255,255,255,0.09); backdrop-filter: blur(18px); color: var(--color-text-inverse)">
    <div class="flex items-center justify-between gap-3">
      <h3 style="font-family: var(--font-heading); font-size: 1.1rem;">Notificaciones</h3>
      @if (unreadCount() > 0) {
      <button type="button" (click)="markAllAsRead()" class="text-xs font-semibold transition hover:opacity-80" style="color: var(--color-brand-secondary)">
        Marcar todas leidas
      </button>
      }
    </div>

    @if (actionError()) {
    <div class="mt-3 rounded-xl px-3 py-2 text-xs" style="background: var(--color-danger-10); color: var(--color-danger)">
      {{ actionError() }}
    </div>
    }

    <div class="mt-4 flex max-h-[20rem] flex-col gap-1 overflow-auto pr-1">
      @if (!notifications().length) {
      <p class="py-6 text-center text-sm" style="color: var(--color-white-50)">No tienes notificaciones recientes.</p>
      } @else {
      @for (notification of notifications(); track notification.id) {
      <button type="button" (click)="navigateToResource(notification)"
        class="flex items-start gap-3 rounded-2xl px-3 py-3 text-left transition hover:translate-x-0.5"
        [style.background]="notification.read ? 'transparent' : 'rgba(255,255,255,0.05)'">

        @if (!notification.read) {
        <span class="mt-1.5 h-2.5 w-2.5 flex-shrink-0 rounded-full" style="background: var(--color-brand-secondary)"></span>
        } @else {
        <span class="mt-1.5 h-2.5 w-2.5 flex-shrink-0 rounded-full" style="background: rgba(255,255,255,0.20)"></span>
        }

        <div class="min-w-0 flex-1">
          <p class="text-sm" style="font-family: var(--font-heading); color: var(--color-text-inverse)">{{ notification.title }}</p>
          <p class="mt-1 text-xs leading-snug" style="color: var(--color-white-60)">{{ notification.body }}</p>
          <div class="mt-2 flex items-center justify-between gap-3 text-xs" style="color: var(--color-white-35)">
            <span>{{ notification.createdAt | date:'short' }}</span>
            @if (!notification.read) {
            <button type="button" (click)="markAsRead(notification, $event)" class="font-semibold transition hover:opacity-80" style="color: var(--color-brand-secondary)">
              Marcar leida
            </button>
            }
          </div>
        </div>
      </button>
      }
      }
    </div>
  </div>
  }
</div>
