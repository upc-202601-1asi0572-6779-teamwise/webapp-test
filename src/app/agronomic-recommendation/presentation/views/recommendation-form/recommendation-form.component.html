<section class="min-h-dvh px-6 py-8 sm:px-8 lg:px-10 lg:py-10" style="background: var(--color-bg-page)">
  <div class="mx-auto flex w-full max-w-4xl flex-col gap-6">
    <a routerLink="/recomendaciones" class="text-sm" style="color: var(--color-brand-primary)">
      &larr; {{ backLabel }}
    </a>

    @if (store.recommendationFormLoading()) {
    <div class="flex min-h-60 flex-col items-center justify-center gap-3 rounded-[1.75rem] border px-6 py-10" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle)">
      <div class="h-8 w-8 animate-spin rounded-full border-2" style="border-color: var(--color-border-subtle); border-top-color: var(--color-brand-primary)"></div>
      <p style="color: var(--color-text-muted)">{{ loadingText }}</p>
    </div>
    } @else {
    <div class="rounded-[1.75rem] border px-6 py-6 sm:px-8" style="background: var(--color-bg-surface); border-color: var(--color-border-subtle); box-shadow: var(--shadow-card)">
      <h1 class="mt-3" style="font-family: var(--font-heading); font-size: clamp(2rem, 3vw, 3rem); font-weight: var(--font-weight-bold); color: var(--color-text-primary)">
        {{ titleText }}
      </h1>
      <p class="mt-2 max-w-2xl" style="color: var(--color-text-secondary)">
        {{ subtitleText }}
      </p>

      @if (store.recommendationFormError()) {
      <div class="mt-5 rounded-2xl border px-4 py-3 text-sm" style="background: var(--color-danger-10); color: var(--color-danger); border-color: var(--color-danger)">
        {{ store.recommendationFormError() }}
      </div>
      }

      <form [formGroup]="form" (ngSubmit)="save()" class="mt-6 flex flex-col gap-5">
        <div class="grid gap-5 sm:grid-cols-2">
          <div>
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ plantationLabel }}</label>
            <select formControlName="plantationId" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)">
              <option [value]="0">{{ plantationPlaceholder }}</option>
              @for (p of store.recommendationFormPlants(); track p.id) {
              <option [value]="p.id">{{ p.name }}</option>
              }
            </select>
          </div>

          <div>
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ zoneLabel }}</label>
            <select formControlName="monitoringZoneId" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)">
              <option [value]="0">{{ store.recommendationFormZonesLoading() ? zoneLoadingText : zonePlaceholder }}</option>
              @for (z of store.recommendationFormZones(); track z.id) {
              <option [value]="z.id">{{ z.name }} &middot; {{ z.hectares }} hect.</option>
              }
            </select>
          </div>

          <div class="sm:col-span-2">
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ alertLabel }}</label>
            <select formControlName="alertId" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)">
              <option [value]="0">{{ alertNoneLabel }}</option>
              @for (a of store.recommendationFormAlerts(); track a.id) {
              <option [value]="a.id">{{ a.alertLevel }} — {{ a.title }}</option>
              }
            </select>
          </div>

          <div class="sm:col-span-2">
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ titleFieldLabel }}</label>
            <input formControlName="title" type="text" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)" [placeholder]="titlePlaceholder" />
          </div>

          <div class="sm:col-span-2">
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ descriptionLabel }}</label>
            <textarea formControlName="description" rows="4" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent resize-none" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)" [placeholder]="descriptionPlaceholder"></textarea>
          </div>

          <div class="sm:col-span-2">
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ actionLabel }}</label>
            <input formControlName="recommendedAction" type="text" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)" [placeholder]="actionPlaceholder" />
          </div>

          <div>
            <label class="mb-1.5 block text-sm" style="color: var(--color-text-secondary)">{{ priorityLabel }}</label>
            <select formControlName="priority" class="w-full rounded-xl border px-4 py-3.5 outline-none transition focus:ring-2 focus:border-transparent" style="border-color: var(--color-border-subtle); background: var(--color-bg-surface); color: var(--color-text-primary); --tw-ring-color: var(--color-brand-primary)">
              <option value="low">{{ priorityOptionLabel('low') }}</option>
              <option value="medium">{{ priorityOptionLabel('medium') }}</option>
              <option value="high">{{ priorityOptionLabel('high') }}</option>
              <option value="critical">{{ priorityOptionLabel('critical') }}</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col gap-3 sm:flex-row">
          <button type="button" (click)="generateWithAI()" [disabled]="store.recommendationFormSaving()" class="flex-1 rounded-xl border px-5 py-3.5 font-semibold transition disabled:opacity-50" style="border-color: var(--color-accent-cyan); color: var(--color-accent-cyan)">
            {{ generateAiLabel }}
          </button>
          <button type="submit" [disabled]="form.invalid || store.recommendationFormSaving()" class="flex-1 rounded-xl px-5 py-3.5 font-semibold transition disabled:opacity-50 active:scale-[0.98]" style="background: var(--color-brand-primary); color: var(--color-text-inverse)">
            {{ store.recommendationFormSaving() ? savingLabel : saveDraftLabel }}
          </button>
          <a routerLink="/recomendaciones" class="flex-1 rounded-xl border px-5 py-3.5 text-center font-semibold" style="border-color: var(--color-border-subtle); color: var(--color-text-secondary)">
            {{ cancelLabel }}
          </a>
        </div>
      </form>
    </div>
    }
  </div>
</section>
